<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake - Public Leaderboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { margin:0; background:#0a0a0a; color:#0f0; font-family:monospace; text-align:center; }
canvas { background:#111; border:4px solid #0f0; margin:20px auto; display:block; }
#leaderboard { max-width:600px; margin:20px auto; background:#111; padding:15px; border-radius:10px; border:2px solid #0f0; }
table { width:100%; border-collapse:collapse; }
th, td { padding:10px; border-bottom:1px solid #333; }
th { color:#0f0; }
button { padding:12px 25px; font-size:18px; background:#0f0; color:#000; border:none; border-radius:6px; cursor:pointer; margin:10px; }
h1 { margin:15px 0; }
</style>
</head>
<body>
<h1>🐍 SNAKE - PUBLIC LEADERBOARD</h1>
<canvas id="game" width="400" height="400"></canvas>

<div id="leaderboard">
<h2>🏆 Top 10 Scores</h2>
<table>
<thead><tr><th>Rank</th><th>Wallet</th><th>Score</th></tr></thead>
<tbody id="lbBody"></tbody>
</table>
</div>

<button onclick="startGame()">New Game</button>

<script>
// Supabase
const supabase = Supabase.createClient(
'https://bbcyuqwxxrdtwptemolt.supabase.co',
'sb_publishable_2EWFcmDjlO7Y3BPLXDnzEw_gUwWSEzP'
);

// Snake variables
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const box = 25;
let snake = [];
let food = {};
let dx = box, dy = 0;
let score = 0;
let gameRunning = true;
let gameInterval;

function initGame() {
snake = [{x: 200, y: 200}];
dx = box; dy = 0;
score = 0;
gameRunning = true;
generateFood();
}

function generateFood() {
food = {
x: Math.floor(Math.random() * 16) * box,
y: Math.floor(Math.random() * 16) * box
};
}

function draw() {
ctx.fillStyle = "#111";
ctx.fillRect(0, 0, canvas.width, canvas.height);

ctx.fillStyle = "#0f0";
snake.forEach(s => ctx.fillRect(s.x, s.y, box, box));

ctx.fillStyle = "#f00";
ctx.fillRect(food.x, food.y, box, box);
}

function move() {
if (!gameRunning) return;

const head = { x: snake[0].x + dx, y: snake[0].y + dy };

// Collision
if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height ||
snake.some(s => s.x === head.x && s.y === head.y)) {
endGame();
return;
}

snake.unshift(head);

if (head.x === food.x && head.y === food.y) {
score += 10;
generateFood();
} else {
snake.pop();
}

draw();
}

function endGame() {
gameRunning = false;
clearInterval(gameInterval);

const wallet = prompt(`Game Over!\n\nYou scored ${score} points!\n\nEnter wallet address:`);
if (wallet && wallet.trim()) {
supabase.from('leaderboard').insert([{ wallet: wallet.trim(), score: score }])
.then(() => loadLeaderboard());
}
alert(`Game Over! Score: ${score}`);
}

async function loadLeaderboard() {
const { data } = await supabase
.from('leaderboard')
.select('wallet, score')
.order('score', { ascending: false })
.limit(10);

const tbody = document.getElementById("lbBody");
tbody.innerHTML = "";
data.forEach((row, i) => {
const short = row.wallet.substring(0,6) + "..." + row.wallet.slice(-4);
tbody.innerHTML += `<tr><td>${i+1}</td><td>${short}</td><td>${row.score}</td></tr>`;
});
}

// Controls
document.addEventListener("keydown", e => {
if (!gameRunning) return;
if (e.key === "ArrowLeft" && dx !== box) { dx = -box; dy = 0; }
if (e.key === "ArrowRight" && dx !== -box) { dx = box; dy = 0; }
if (e.key === "ArrowUp" && dy !== box) { dx = 0; dy = -box; }
if (e.key === "ArrowDown" && dy !== -box) { dx = 0; dy = box; }
});

function startGame() {
initGame();
draw();
if (gameInterval) clearInterval(gameInterval);
gameInterval = setInterval(move, 120);
}

// Start
window.onload = () => {
startGame();
loadLeaderboard();
};
</script>
</body>
</html>

h2 { font-size:3.2rem; color:var(--accent); margin-bottom:40px; text-align:center; }

#game { background:#0a0f0c; border:6px solid var(--accent); border-radius:16px; box-shadow:0 0 40px rgba(0,196,140,0.3); }

#leaderboard { background:var(--card); border:1px solid rgba(0,196,140,0.2); border-radius:20px; padding:50px 40px; max-width:900px; margin:60px auto; }
#leaderboard table { width:100%; border-collapse:collapse; background:#0a0f0c; border-radius:12px; overflow:hidden; }

#leaderboard th { background:var(--accent); color:#0a0f0c; font-weight:700; }
